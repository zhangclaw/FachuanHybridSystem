{% load i18n %}
{% if related_cases %}
<div class="case-timeline">
    <span class="case-timeline-label">{% trans "诉讼历程" %}</span>
    {% for rc in related_cases %}
    {% if not forloop.first %}<span class="case-timeline-arrow">→</span>{% endif %}
    {% if rc.pk == case.pk %}
    <span class="case-timeline-pill current">
        <span class="pill-stage">{{ rc.get_current_stage_display|default:"—" }}</span>
    </span>
    {% else %}
    <a href="{% url 'admin:cases_case_detail' rc.pk %}" class="case-timeline-pill">
        <span class="pill-stage">{{ rc.get_current_stage_display|default:"—" }}</span>
    </a>
    {% endif %}
    {% endfor %}
</div>
{% endif %}
