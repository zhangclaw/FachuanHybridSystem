{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}{ - {{ case.name }}{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'litigation_ai/css/mock_trial.css' %}?v=20260315">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
{% endblock %}

{% block content %}
<div class="mock-trial-page"
     x-data="mockTrialApp({ caseId: {{ case.pk }}, caseName: '{{ case.name|escapejs }}' })"
     x-init="init()">

    <!-- Header -->
    <header class="mt-header">
        <div class="mt-header-left">
            <a href="{% url 'admin:cases_case_detail' case.pk %}" class="btn-back">← {</a>
            <h1>⚖️ { — {{ case.name }}</h1>
        </div>
        <div class="mt-header-right">
            <span class="session-status" x-show="sessionId" x-text="statusText"></span>
            <!-- 导出按钮 -->
            <button x-show="sessionId && statusText === '已完成'"
                    @click="exportReport()"
                    :disabled="exporting"
                    class="btn-export">
                <span x-show="!exporting">📥 {</span>
                <span x-show="exporting">{</span>
            </button>
        </div>
    </header>

    <div class="mt-body">
        <!-- 左侧：模式选择 + 会话列表 -->
        <aside class="mt-sidebar">
            <div class="mode-cards">
                <h3>{</h3>
                <button class="mode-card" :class="{ active: selectedMode === 'judge' }"
                        @click="selectMode('judge')" :disabled="!!sessionId">
                    <span class="mode-icon">🔍</span>
                    <span class="mode-name">{</span>
                    <span class="mode-desc">{</span>
                </button>
                <button class="mode-card" :class="{ active: selectedMode === 'cross_exam' }"
                        @click="selectMode('cross_exam')" :disabled="!!sessionId">
                    <span class="mode-icon">📋</span>
                    <span class="mode-name">{</span>
                    <span class="mode-desc">{</span>
                </button>
                <button class="mode-card" :class="{ active: selectedMode === 'debate' }"
                        @click="selectMode('debate')" :disabled="!!sessionId">
                    <span class="mode-icon">💬</span>
                    <span class="mode-name">{</span>
                    <span class="mode-desc">{</span>
                </button>

                <!-- 辩论难度选择器 -->
                <div x-show="showDifficultySelector && selectedMode === 'debate' && !sessionId" class="difficulty-selector">
                    <label>{</label>
                    <select x-model="debateDifficulty">
                        <option value="easy">{</option>
                        <option value="medium">{</option>
                        <option value="hard">{</option>
                    </select>
                </div>
            </div>

            <!-- 历史会话 -->
            <div class="session-history">
                <h3>{</h3>
                <template x-for="s in sessions" :key="s.session_id">
                    <div class="history-item" :class="{ active: sessionId === s.session_id }"
                         @click="loadSession(s.session_id)">
                        <span class="history-mode" x-text="getModeLabel(s.metadata?.mock_trial_mode)"></span>
                        <span class="history-time" x-text="formatTime(s.created_at)"></span>
                        <!-- 会话预览 -->
                        <div class="history-preview" x-text="getSessionPreview(s)"></div>
                        <button class="history-delete" @click.stop="deleteSession(s.session_id)">🗑️</button>
                    </div>
                </template>
                <div x-show="sessions.length === 0" class="empty-hint">{</div>
            </div>
        </aside>

        <!-- 右侧：对话区域 -->
        <main class="mt-chat">
            <!-- 进度条 -->
            <div x-show="progress.show" class="mt-progress-bar">
                <div class="progress-info">
                    <span x-text="progress.message"></span>
                    <span x-text="progress.percentage + '%'"></span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" :style="'width: ' + progress.percentage + '%'"></div>
                </div>
            </div>

            <!-- 消息列表 -->
            <div class="mt-messages" x-ref="messagesContainer">
                <div x-show="!sessionId && messages.length === 0" class="mt-empty">
                    <div class="mt-empty-icon">⚖️</div>
                    <div class="mt-empty-text">{</div>
                </div>

                <template x-for="msg in messages" :key="msg.id || msg.created_at">
                    <div class="mt-message" :class="msg.role">
                        <div class="mt-message-avatar">
                            <span x-text="msg.role === 'user' ? '👤' : msg.role === 'system' ? '⚙️' : '⚖️'"></span>
                        </div>
                        <div class="mt-message-body">
                            <div class="mt-message-content" x-html="renderMarkdown(msg.content)"></div>
                            <div class="mt-message-time" x-show="msg.role !== 'system'"
                                 x-text="formatMsgTime(msg.created_at)"></div>
                        </div>
                    </div>
                </template>

                <div x-show="loading" class="mt-loading">
                    <div class="spinner"></div>
                    <span>{</span>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="mt-input" x-show="sessionId">
                <textarea x-ref="inputArea" x-model="inputMessage"
                          @keydown.enter="$event.shiftKey || ($event.preventDefault(), sendMessage())"
                          placeholder="{"
                          rows="3" :disabled="loading"></textarea>
                <button @click="sendMessage()" :disabled="!inputMessage.trim() || loading" class="btn-send">
                    {
                </button>
            </div>
        </main>
    </div>
</div>

{% csrf_token %}
<script src="{% static 'litigation_ai/js/mock_trial_app.js' %}?v=20260315"></script>
{% endblock %}
